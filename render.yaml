# Render Blueprint — provisions a Postgres database + Node web service.
# In the Render dashboard: New → Blueprint → connect this repo.
# After the first deploy, set the "sync: false" secrets in the service's
# Environment tab (Google + SMTP are optional).

databases:
  - name: furnicraft-db
    databaseName: furnicraft
    user: furnicraft
    plan: free

services:
  - type: web
    name: furnicraft-3d
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Wired automatically from the database above
      - key: DATABASE_URL
        fromDatabase:
          name: furnicraft-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      # Auto-generated strong secret for signing sessions
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "30d"
      # Optional — set these in the dashboard to enable the features
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
